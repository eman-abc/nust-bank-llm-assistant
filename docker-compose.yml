version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env # This pulls your LANGCHAIN_API_KEY automatically!
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "7860:7860"
    depends_on:
      - backend
    environment:
      - API_BASE_URL=http://backend:8000/api
    # We add this to ensure the stream isn't buffered/blocked by Docker
    stop_signal: SIGINT